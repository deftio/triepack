title: TriePack
version: "1.1.0"
description: Compressed trie-based dictionary format for fast, compact key-value storage
theme: minima
baseurl: "/triepack"
url: "https://deftio.github.io"

github:
  repository_url: "https://github.com/deftio/triepack"

header_pages:
  - index.md
  - guide/getting-started.md
  - guide/how-it-works.md
  - guide/api-reference.md
  - guide/examples.md
  - guide/building.md
  - builds.md
  - releases.md

exclude:
  - build/
  - bindings/
  - cmake/
  - src/
  - tests/
  - wrapper/
  - plan/
  - CMakeLists.txt
  - Doxyfile.in
  - "*.c"
  - "*.h"
  - "*.cpp"
  - "*.hpp"
